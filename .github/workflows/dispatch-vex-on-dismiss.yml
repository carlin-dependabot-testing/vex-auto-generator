name: Dispatch VEX Generator for Dismissed Alerts

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write
  security-events: read

jobs:
  check-dismissed-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to check existing VEX files
        uses: actions/checkout@v4

      - name: Find and dispatch for unprocessed dismissed alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          # Collect GHSA IDs that already have a VEX file or an open/merged PR
          existing_vex=""
          if [ -d ".vex" ]; then
            existing_vex=$(ls .vex/*.json 2>/dev/null | xargs -I{} basename {} .json | tr '\n' ' ' || true)
          fi

          # Also check for open PRs already created by the VEX generator
          open_prs=$(gh pr list --repo "$REPO" --label vex --state all --json title -q '.[].title' || true)

          echo "Existing VEX files: ${existing_vex:-none}"
          echo "Existing VEX PRs: ${open_prs:-none}"

          # Get all dismissed alerts — write to file to avoid shell variable mangling
          ALERTS_FILE=$(mktemp)
          gh api "/repos/${REPO}/dependabot/alerts?state=dismissed&per_page=100" > "$ALERTS_FILE" 2>/dev/null || echo "[]" > "$ALERTS_FILE"

          count=$(jq 'length' "$ALERTS_FILE")
          echo "Found ${count} dismissed alert(s)"

          dispatched=0

          for i in $(seq 0 $((count - 1))); do
            ALERT_NUMBER=$(jq -r ".[$i].number" "$ALERTS_FILE")
            GHSA_ID=$(jq -r ".[$i].security_advisory.ghsa_id // \"\"" "$ALERTS_FILE")
            CVE_ID=$(jq -r ".[$i].security_advisory.cve_id // \"\"" "$ALERTS_FILE")

            # Skip if VEX file already exists
            if [ -n "$existing_vex" ] && echo "$existing_vex" | grep -qi "$GHSA_ID" 2>/dev/null; then
              echo "Skipping alert #${ALERT_NUMBER} (${GHSA_ID}) — VEX file exists"
              continue
            fi

            # Skip if a PR already exists for this alert
            if [ -n "$open_prs" ] && { echo "$open_prs" | grep -qi "$CVE_ID" 2>/dev/null || echo "$open_prs" | grep -qi "$GHSA_ID" 2>/dev/null; }; then
              echo "Skipping alert #${ALERT_NUMBER} (${GHSA_ID}) — PR already exists"
              continue
            fi

            PACKAGE_NAME=$(jq -r ".[$i].dependency.package.name // \"\"" "$ALERTS_FILE")
            PACKAGE_ECOSYSTEM=$(jq -r ".[$i].dependency.package.ecosystem // \"\"" "$ALERTS_FILE")
            SEVERITY=$(jq -r ".[$i].security_advisory.severity // \"\"" "$ALERTS_FILE")
            SUMMARY=$(jq -r ".[$i].security_advisory.summary // \"\"" "$ALERTS_FILE")
            DISMISSED_REASON=$(jq -r ".[$i].dismissed_reason // \"\"" "$ALERTS_FILE")

            echo "Dispatching for alert #${ALERT_NUMBER}: ${GHSA_ID} (${CVE_ID}) — ${PACKAGE_NAME}"

            gh workflow run vex-generator.lock.yml \
              --repo "$REPO" \
              -f alert_number="$ALERT_NUMBER" \
              -f ghsa_id="$GHSA_ID" \
              -f cve_id="$CVE_ID" \
              -f package_name="$PACKAGE_NAME" \
              -f package_ecosystem="$PACKAGE_ECOSYSTEM" \
              -f severity="$SEVERITY" \
              -f summary="$SUMMARY" \
              -f dismissed_reason="$DISMISSED_REASON"

            echo "✓ Dispatched for alert #${ALERT_NUMBER}"
            dispatched=$((dispatched + 1))

            # Small delay to avoid rate limiting if many alerts
            sleep 2
          done

          rm -f "$ALERTS_FILE"
          echo ""
          echo "Done. Dispatched ${dispatched} workflow(s)."
