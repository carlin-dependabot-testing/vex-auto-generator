# This is a thin dispatcher workflow that bridges the `dependabot_alert` event
# (not supported by gh-aw) to a `repository_dispatch` event that triggers
# the agentic VEX generator workflow.

name: Dispatch VEX Generator on Alert Dismissal

on:
  dependabot_alert:
    types: [dismissed]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to VEX generator workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: dependabot_alert_dismissed
          client-payload: |
            {
              "alert_number": "${{ github.event.alert.number }}",
              "ghsa_id": "${{ github.event.alert.security_advisory.ghsa_id }}",
              "cve_id": "${{ github.event.alert.security_advisory.cve_id }}",
              "package_name": "${{ github.event.alert.security_vulnerability.package.name }}",
              "package_ecosystem": "${{ github.event.alert.security_vulnerability.package.ecosystem }}",
              "vulnerable_version_range": "${{ github.event.alert.security_vulnerability.vulnerable_version_range }}",
              "severity": "${{ github.event.alert.security_advisory.severity }}",
              "summary": "${{ github.event.alert.security_advisory.summary }}",
              "dismissed_reason": "${{ github.event.alert.dismissed_reason }}",
              "dismissed_comment": "${{ github.event.alert.dismissed_comment }}",
              "dismissed_by": "${{ github.event.sender.login }}"
            }
